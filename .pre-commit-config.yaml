repos:
  - repo: local
    hooks:
      - id: format-check
        name: format-check
        entry: make format-check
        language: system
        pass_filenames: false
      - id: lint
        name: lint
        entry: make lint
        language: system
        pass_filenames: false
      - id: typecheck
        name: typecheck
        entry: make typecheck
        language: system
        pass_filenames: false
